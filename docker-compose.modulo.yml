services:
  modulo-app:
    build:
      context: ./src/CarteiraBank.Services.Api
      dockerfile: Dockerfile
    container_name: carteira-modulo-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      UseInMemoryDatabase: "false"
      ConnectionStrings__DefaultConnection: Host=pgsql-modulo;Port=5432;Database=carteira_bank_modulo;Username=postgres;Password=postgres
      Serilog__WriteTo__1__Args__uri: http://loki:3100
    ports:
      - "5099:8080"
    depends_on:
      pgsql-modulo:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - rede-app
      - rede-observabilidade

  pgsql-modulo:
    image: postgres:18.3
    container_name: carteira-pgsql-modulo
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carteira_bank_modulo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carteira_bank_modulo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgsql-modulo-data:/var/lib/postgresql
    networks:
      - rede-app

  loki:
    image: grafana/loki:2.9.8
    container_name: carteira-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - rede-observabilidade

  grafana:
    image: grafana/grafana:11.0.0
    container_name: carteira-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_started
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    networks:
      - rede-observabilidade

volumes:
  pgsql-modulo-data:
  loki-data:
  grafana-data:

networks:
  rede-app:
    name: carteira-rede-app
  rede-observabilidade:
    name: carteira-rede-observabilidade
