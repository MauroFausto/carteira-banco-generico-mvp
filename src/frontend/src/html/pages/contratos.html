<!doctype html>
<html lang="en" data-page="contratos">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Super Admin 3.1 | Carteira Bank - Contratos</title>
		<link rel="icon" type="icon" href="../../../favicon.ico" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
	</head>
	<body>
		<module href="./src/html/partials/_page-loader.html"></module>
		<module href="./src/html/partials/_nav-bar.html"></module>
		<module href="./src/html/partials/_sidebar.html"></module>

		<header class="content-header">
			<h2 class="m-0 ps-3 text-body-emphasis fs-6">Contratos</h2>
			<i class="ms-auto"></i>
		</header>

		<div id="content" data-scrollbar>
			<div class="card mb-3">
				<div class="card-body">
					<h3 class="card-title fs-5 mb-4">Lista de contratos</h3>
					<div class="table-responsive">
						<table id="cb-tabela-contratos" class="table align-middle">
							<thead>
								<tr>
									<th>ID</th>
									<th>Cliente</th>
									<th>Numero</th>
									<th>Principal</th>
									<th>Status</th>
									<th>Parcelas abertas</th>
									<th>Acoes</th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
				</div>
			</div>

			<div id="cb-contratos-feedback"></div>
		</div>

		<script>
			window.defaultTheme = "8";
			var availableThemes = ["1", "2", "3", "4", "5", "6", "7", "8"];
			var theme = localStorage.getItem("sa-theme") || window.defaultTheme;
			if (!availableThemes.includes(theme)) {
				theme = window.defaultTheme;
				localStorage.setItem("sa-theme", theme);
			}
			document.documentElement.setAttribute("data-sa-theme", theme);
		</script>
		<script src="../../js/index.js" type="module"></script>
		<script src="../../js/vendor.js" type="module"></script>
	</body>
</html>
