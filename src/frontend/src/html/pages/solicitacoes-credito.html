<!doctype html>
<html lang="en" data-page="solicitacoes-credito">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Super Admin 3.1 | Carteira Bank - Solicitacoes de Credito</title>
		<link rel="icon" type="icon" href="../../../favicon.ico" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
	</head>
	<body>
		<module href="./src/html/partials/_page-loader.html"></module>
		<module href="./src/html/partials/_nav-bar.html"></module>
		<module href="./src/html/partials/_sidebar.html"></module>

		<header class="content-header">
			<h2 class="m-0 ps-3 text-body-emphasis fs-6">Solicitacoes de Credito</h2>
			<i class="ms-auto"></i>
			<button class="btn btn-sm btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#cb-modal-criar-solicitacao">Nova solicitacao</button>
		</header>

		<div id="content" data-scrollbar>
			<div class="card mb-3">
				<div class="card-body">
					<h3 class="card-title fs-5 mb-4">Solicitacoes</h3>
					<div class="table-responsive">
						<table id="cb-tabela-solicitacoes" class="table align-middle">
							<thead>
								<tr>
									<th>ID</th>
									<th>Cliente</th>
									<th>Valor</th>
									<th>Parcelas</th>
									<th>Finalidade</th>
									<th>Status</th>
									<th>Criado em</th>
									<th>Acoes</th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
				</div>
			</div>

			<div id="cb-solicitacoes-feedback"></div>
		</div>

		<div class="modal fade" id="cb-modal-criar-solicitacao" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<form id="cb-form-solicitacao" class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">Nova solicitacao de credito</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<div class="mb-3">
							<label class="form-label" for="cb-valor-solicitado">Valor solicitado</label>
							<input id="cb-valor-solicitado" class="form-control" type="number" min="1" step="0.01" required />
						</div>
						<div class="mb-3">
							<label class="form-label" for="cb-quantidade-parcelas">Quantidade de parcelas</label>
							<input id="cb-quantidade-parcelas" class="form-control" type="number" min="1" step="1" required />
						</div>
						<div class="mb-0">
							<label class="form-label" for="cb-finalidade">Finalidade</label>
							<input id="cb-finalidade" class="form-control" type="text" maxlength="120" required />
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-subtle" data-bs-dismiss="modal">Cancelar</button>
						<button type="submit" class="btn btn-primary">Enviar</button>
					</div>
				</form>
			</div>
		</div>

		<script>
			window.defaultTheme = "8";
			var availableThemes = ["1", "2", "3", "4", "5", "6", "7", "8"];
			var theme = localStorage.getItem("sa-theme") || window.defaultTheme;
			if (!availableThemes.includes(theme)) {
				theme = window.defaultTheme;
				localStorage.setItem("sa-theme", theme);
			}
			document.documentElement.setAttribute("data-sa-theme", theme);
		</script>
		<script src="../../js/index.js" type="module"></script>
		<script src="../../js/vendor.js" type="module"></script>
	</body>
</html>
