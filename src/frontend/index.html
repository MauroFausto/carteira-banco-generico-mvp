<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carteira Bank MVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.1/css/bulma.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title">Carteira Bank MVP</h1>
      <p class="subtitle">Cliente e Supervisor (RBAC por cabecalho para desenvolvimento local)</p>

      <div class="box">
        <h2 class="title is-5">Contexto de usuario</h2>
        <div class="columns">
          <div class="column">
            <label class="label">User Id</label>
            <input id="userId" class="input" value="11111111-1111-1111-1111-111111111111">
          </div>
          <div class="column">
            <label class="label">Role</label>
            <div class="select is-fullwidth">
              <select id="role">
                <option>Cliente</option>
                <option>Supervisor</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="columns">
        <div class="column">
          <div class="box">
            <h2 class="title is-5">Nova solicitacao de credito</h2>
            <div class="field">
              <label class="label">Valor</label>
              <input id="amount" class="input" type="number" step="0.01" value="2500">
            </div>
            <div class="field">
              <label class="label">Parcelas</label>
              <input id="installments" class="input" type="number" value="6">
            </div>
            <div class="field">
              <label class="label">Finalidade</label>
              <input id="purpose" class="input" value="Renegociacao">
            </div>
            <button id="createApplication" class="button is-primary is-fullwidth">Criar solicitacao</button>
          </div>
        </div>
        <div class="column">
          <div class="box">
            <h2 class="title is-5">Solicitacoes</h2>
            <button id="loadApplications" class="button is-link is-light mb-3">Atualizar</button>
            <div id="applications"></div>
          </div>
        </div>
      </div>

      <div class="box">
        <h2 class="title is-5">Contratos e saldo devedor</h2>
        <button id="loadContracts" class="button is-link is-light mb-3">Carregar contratos</button>
        <div id="contracts"></div>
      </div>

      <article class="message is-info">
        <div class="message-body">
          Este frontend usa RBAC por cabecalhos para desenvolvimento local:
          <code>X-User-Id</code> e <code>X-User-Role</code>.
        </div>
      </article>
    </div>
  </section>

  <script src="/js/app.js"></script>
</body>
</html>
