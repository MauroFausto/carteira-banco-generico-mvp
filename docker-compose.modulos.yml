      retries: 5
      start_period: 10s
    volumes:
      - pgsql-frontend-data:/var/lib/postgresql
    networks:
      - rede-app

volumes:
  pgsql-auth-data:
  pgsql-credito-data:
  pgsql-divida-data:
  pgsql-acordo-data:
  pgsql-boleto-data:
  pgsql-frontend-data:

networks:
  rede-app:
    name: carteira-rede-app
  rede-observabilidade:
    name: carteira-rede-observabilidade
