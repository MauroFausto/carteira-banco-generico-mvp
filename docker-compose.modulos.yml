    volumes:
      - pgsql-acordo-data:/var/lib/postgresql
    networks:
      - rede-app

  pgsql-boleto:
    image: postgres:18.3
    container_name: carteira-pgsql-boleto
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGSQL_USER:-postgres}
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      POSTGRES_DB: ${PGSQL_BOLETO_DB:-carteira_boleto}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGSQL_USER:-postgres} -d ${PGSQL_BOLETO_DB:-carteira_boleto}"]
      interval: 10s
      timeout: 5s
