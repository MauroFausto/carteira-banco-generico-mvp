    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGSQL_USER:-postgres}
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      POSTGRES_DB: ${PGSQL_DIVIDA_DB:-carteira_divida}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGSQL_USER:-postgres} -d ${PGSQL_DIVIDA_DB:-carteira_divida}"]
