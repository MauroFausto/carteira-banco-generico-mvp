name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Restore API
        run: dotnet restore src/backend/CarteiraBank.Api/CarteiraBank.Api.csproj

      - name: Build API
        run: dotnet build src/backend/CarteiraBank.Api/CarteiraBank.Api.csproj --no-restore

      - name: Restore Tests
        run: dotnet restore src/backend/CarteiraBank.Api.Tests/CarteiraBank.Api.Tests.csproj

      - name: Run Tests
        run: dotnet test src/backend/CarteiraBank.Api.Tests/CarteiraBank.Api.Tests.csproj --no-restore --verbosity normal

      - name: Secret Scan (strict-block)
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
