name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore CarteiraBankMvp.slnx

      - name: Build solution
        run: dotnet build CarteiraBankMvp.slnx --no-restore

      - name: Run tests
        run: dotnet test CarteiraBankMvp.slnx --no-build --verbosity normal

      - name: Secret Scan (strict-block)
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
